<header>

<div class="tabs">

</div>
 
<div class="content">
 
<!-- TAB 1 — 聲調查字 -->
<div class="panel active" id="panel-tone">
  <p class="sec-desc">
    按下聲調數字，建立聲調序列（例如 4→1 代表先陽平後陰平），即時顯示所有聲調吻合的詞語。
    優先顯示基督教詩歌用語。
  </p>
  <div class="tone-legend" id="tone-legend"></div>
  <div class="tone-section">
    <h3>📌 點擊加入聲調：</h3>
    <div class="tone-pills" id="tone-pills"></div>
    <div class="seq-bar" id="tone-seq">
      <span class="seq-hint">點擊上方數字加入聲調…</span>
    </div>
    <div class="actions-row">
      <button class="ghost" onclick="clearSeq()">✕ 清除</button>
      <button class="go" onclick="searchByTones()" id="btn-tone-search">查詞語</button>
    </div>
  </div>
  <div id="tone-results"></div>
</div>
 
<!-- TAB 2 — 主題詞庫 -->
<div class="panel" id="panel-genre">
  <p class="sec-desc">
    選擇或輸入詩歌主題，獲取常用粵語詞句及聲調，方便配合旋律。
  </p>
  <div class="genre-chips" id="genre-chips"></div>
  <div class="search-row">
    <input id="genre-input" placeholder="輸入主題，例：讚美、敬拜、感恩、受苦…" onkeydown="if(event.key==='Enter')searchByGenre()">

  </div>
  <div id="genre-status" class="status"></div>
  <div id="genre-results" class="results-grid"></div>
</div>

const TONE_INDEX = {}; 
PHRASES.forEach(p => {
  const key = p.t.join("-");
  if (!TONE_INDEX[key]) TONE_INDEX[key] = [];
  TONE_INDEX[key].push(p);
});
 
const TC = { 1:"#d62828",2:"#e07c24",3:"#1a9e8a",4:"#2e6fa3",5:"#7b2fbe",6:"#4a5260" };
const TN = { 1:"陰平",2:"陰上",3:"陰去",4:"陽平",5:"陽上",6:"陽去" };
const TT = { 1:"高平↔",2:"高升↗",3:"高降↘",4:"低平→",5:"低升↗",6:"低降↘" };
const TYPE_LABEL = { faith:"基督教",praise:"讚美",prayer:"禱告",life:"生命",gen:"一般" };
const TYPE_COLOR = { faith:"#b5251a",praise:"#c9933a",prayer:"#2e6fa3",life:"#1a9e8a",gen:"#888" };
 
let seq = [];
 
function switchTab(id){
  const ids=["tone","genre"]; // Removed 'jyut'
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",ids[i]===id));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById("panel-"+id).classList.add("active");
}
 

function renderToneLegend(){
  document.getElementById("tone-legend").innerHTML =
    [1,2,3,4,5,6].map(t=>`
      <div class="tl-item">
        <div class="tl-dot" style="background:${TC[t]}">${t}</div>
        <span>${TN[t]} ${TT[t]}</span>
      </div>`).join("");
}
 
function renderTonePills(){
  document.getElementById("tone-pills").innerHTML =
    [1,2,3,4,5,6].map(t=>`
      <button class="tone-pill" data-t="${t}" style="background:${TC[t]}" onclick="addTone(${t})">
        ${t}<span class="tip">${TN[t]} ${TT[t]}</span>
      </button>`).join("");
}
 

function addTone(t){
  if(seq.length>=6) return;
  seq.push(t);
  renderSeq();
}
function removeTone(i){ seq.splice(i,1); renderSeq(); }
function clearSeq(){
  seq=[];
  renderSeq();
  document.getElementById("tone-results").innerHTML="";
}
function renderSeq(){
  const el=document.getElementById("tone-seq");
  if(!seq.length){ el.innerHTML='<span class="seq-hint">點擊上方數字加入聲調…</span>'; return; }
  el.innerHTML = seq.map((t,i)=>`
    <div class="seq-item">
      <div class="seq-dot" style="background:${TC[t]}">${t}</div>
      <div class="seq-lbl">${TN[t]}</div>
      <button class="seq-del" onclick="removeTone(${i})">✕</button>
    </div>`).join("")
    +`<span style="color:#aaa;font-size:12px;margin-left:6px">序列：${seq.join(" → ")}</span>`;
}

function searchByTones(){
  if(!seq.length) return;
  const key = seq.join("-");
  const el = document.getElementById("tone-results");
 
  const exact = TONE_INDEX[key] || [];
  const seqStr = seq.join("-");
  const partial = [];
  Object.entries(TONE_INDEX).forEach(([k,phrases])=>{
    if(k===key) return; 
    if(seqStr.includes(k) || k.includes(seqStr)){
      phrases.forEach(p=>partial.push({...p,_matchNote:"部分符合"}));
    }
  });
 
  if(!exact.length && !partial.length){
    el.innerHTML=`
      <div style="padding:20px;background:#fff;border-radius:14px;color:#888;font-size:14px;text-align:center">
        未找到聲調序列「${seq.join("→")}」的詞語。<br>
        <small style="font-size:12px;margin-top:6px;display:block">請試試其他聲調組合，或減少序列長度。</small>
      </div>`;
    return;
  }
 
  let html="";
 
  if(exact.length){
    const sorted = [...exact].sort((a,b)=>{
      const order={faith:0,praise:1,prayer:2,life:3,gen:4};
      return (order[a.type]??5)-(order[b.type]??5);
    });
    html+=`<div class="sec-hdr">完全吻合 <span class="cnt">${sorted.length}</span></div>`;
    html+=`<div class="results-grid">`+sorted.map(p=>phraseCard(p,seq)).join("")+`</div>`;
  }
 
  if(partial.length){
    const pSorted = partial.sort((a,b)=>{
      const order={faith:0,praise:1,prayer:2,life:3,gen:4};
      return (order[a.type]??5)-(order[b.type]??5);
    });
    html+=`<div class="sec-hdr" style="margin-top:24px">部分符合 <span class="cnt">${pSorted.length}</span></div>`;
    html+=`<div class="results-grid">`+pSorted.map(p=>phraseCard(p,seq)).join("")+`</div>`;
  }
 
  el.innerHTML = html;
}

function phraseCard(p, highlightTones){
  const toneKey = p.t.join("-");
  const borderColor = TYPE_COLOR[p.type]||"#ccc";
  const chips = p.j.split(" ").map((jp,i)=>{
    const t=p.t[i]||0;
    const col=TC[t]||"#888";
    return `<span class="jp-chip" style="background:${col}">${jp}<span class="tc">${t}</span></span>`;
  }).join("");
  const toneFlow = p.t.map(t=>`<span style="color:${TC[t]};font-weight:700">${t}</span>`).join(`<span style="color:#ccc;font-size:10px">→</span>`);
  return `
    <div class="phrase-card" style="border-left-color:${borderColor}">
      <div class="phrase-top">
        <div class="phrase-hz">${p.w}</div>
        <span class="phrase-type" style="background:${borderColor}22;color:${borderColor}">${TYPE_LABEL[p.type]||p.type}</span>
      </div>
      <div class="phrase-jp-row">${chips}</div>
      <div style="font-size:11px;color:#bbb;margin-bottom:4px;font-family:'JetBrains Mono',monospace">
        聲調：${toneFlow}
      </div>
      ${p.m?`<div class="phrase-meaning">${p.m}</div>`:""}
    </div>`;
}
 
//  TAB 2 — 主題詞庫 
const GENRES=["讚美","敬拜","感恩","禱告","救恩","復活","聖靈","信心","盼望","受苦","宣教","謙卑","順服"];
 
function renderGenreChips(){
  document.getElementById("genre-chips").innerHTML=
    GENRES.map(g=>`<button class="g-chip" onclick="selectGenre('${g}')">${g}</button>`).join("");
}
function selectGenre(g){
  document.getElementById("genre-input").value=g;
  document.querySelectorAll(".g-chip").forEach(c=>c.classList.toggle("sel",c.textContent===g));
  searchByGenre();
}
const GENRE_TYPE_MAP = {
  讚美:["praise","faith"], 敬拜:["praise","faith"], 感恩:["prayer","praise"],
  禱告:["prayer","faith"], 救恩:["faith"], 復活:["faith"], 聖靈:["faith"],
  信心:["faith","life"], 盼望:["faith","life"], 受苦:["life","faith"],
  宣教:["faith","gen"], 謙卑:["life","faith"], 順服:["faith","life"]
};
const GENRE_KEYWORDS = {
  讚美:["讚","頌","美","歌","揚","稱"], 敬拜:["敬","拜","頌","榮","耀"],
  感恩:["感","謝","恩"], 禱告:["禱","祈","求","告","聽"],
  救恩:["救","贖","罪","赦","血","架"], 復活:["復","生","永","升","死"],
  聖靈:["靈","聖","充","感","膏"], 信心:["信","靠","仰","望","真"],
  盼望:["盼","望","永","恆","來"], 受苦:["苦","難","軟","弱","淚","煉"],
  宣教:["傳","福","音","邦","民","國"], 謙卑:["謙","卑","遜","柔","伏"],
  順服:["順","服","隨","委","跟","捨"]
};
 
function searchByGenre(){
  const val=document.getElementById("genre-input").value.trim();
  if(!val) return;
  const status=document.getElementById("genre-status");
  const results=document.getElementById("genre-results");
  results.innerHTML="";
 
  const types=GENRE_TYPE_MAP[val]||["faith","praise","prayer","life","gen"];
  const kws=GENRE_KEYWORDS[val]||[];
  const localHits=PHRASES.filter(p=>{
    if(types.includes(p.type)) return true;
    if(kws.some(k=>p.w.includes(k)||p.m.includes(k))) return true;
    return false;
  }).sort((a,b)=>{
    const ao=types.indexOf(a.type); const bo=types.indexOf(b.type);
    return (ao<0?99:ao)-(bo<0?99:bo);
  });
 
  if(localHits.length){
    status.textContent=`本地詞庫找到 ${localHits.length} 個「${val}」詞句：`;
    results.innerHTML=localHits.map(p=>phraseCard(p,[])).join("");
  } else {
    status.textContent="未找到結果，請換個主題再試。";
  }
}
 

renderToneLegend();
renderTonePills();
renderGenreChips();
</script>
